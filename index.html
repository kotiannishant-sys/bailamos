<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latin Nights Mumbai</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #f5efe3;
            --panel: rgba(255, 251, 243, 0.92);
            --text: #1a1f24;
            --muted: #616974;
            --accent: #0f6d5b;
            --accent-soft: #d4efe9;
            --line: #d8d2c4;
            --chip: #ece7da;
            --danger: #a13838;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Space Grotesk", "Segoe UI", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 10% 20%, #f6cf90 0%, transparent 38%),
                radial-gradient(circle at 90% 12%, #98d8ca 0%, transparent 34%),
                linear-gradient(165deg, #efe6d3 0%, #f9f5eb 45%, #ece3d1 100%);
            padding: 16px;
        }

        .shell {
            max-width: 980px;
            margin: 0 auto;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 22px;
            overflow: hidden;
            box-shadow: 0 18px 50px rgba(26, 31, 36, 0.14);
            backdrop-filter: blur(10px);
        }

        .hero {
            padding: 22px 18px 18px;
            border-bottom: 1px solid var(--line);
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.5), rgba(212, 239, 233, 0.35));
        }

        .kicker {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            border-radius: 999px;
            background: var(--accent-soft);
            color: var(--accent);
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }

        h1 {
            font-family: "Fraunces", Georgia, serif;
            margin: 12px 0 6px;
            line-height: 1.1;
            font-size: clamp(28px, 7vw, 42px);
            letter-spacing: -0.02em;
        }

        .subtitle {
            margin: 0;
            color: var(--muted);
            font-size: 14px;
        }

        .filters {
            display: grid;
            gap: 12px;
            padding: 14px 16px;
            border-bottom: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.45);
            position: sticky;
            top: 0;
            z-index: 10;
            backdrop-filter: blur(6px);
        }

        .filter-grid {
            display: grid;
            gap: 10px;
            grid-template-columns: 1fr;
        }

        label {
            font-size: 12px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 4px;
            display: block;
        }

        .filter_actions {
            display: flex;
            align-items: end;
        }

        select,
        input[type="search"] {
            width: 100%;
            border: 1px solid var(--line);
            background: white;
            border-radius: 12px;
            padding: 10px 12px;
            font-family: inherit;
            font-size: 15px;
            color: var(--text);
        }

        button {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 10px 12px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            background: #f7f1e2;
            cursor: pointer;
            transition: background-color 140ms ease;
        }

        button:hover {
            background-color: #efe7d6;
        }

        #summary {
            font-size: 13px;
            color: var(--muted);
        }

        .active-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            font-size: 12px;
            color: var(--muted);
        }

        .active-filter-chip {
            background: #f1eadc;
            border: 1px solid var(--line);
            color: #2f3842;
            border-radius: 999px;
            padding: 4px 10px;
            font-weight: 500;
        }

        main {
            padding: 16px;
            display: grid;
            gap: 14px;
        }

        .day-block {
            animation: fadeIn 200ms ease both;
        }

        .day-title {
            margin: 0 0 10px;
            font-family: "Fraunces", Georgia, serif;
            font-size: 20px;
            letter-spacing: -0.01em;
        }

        .event-card {
            background: #fffef8;
            border: 1px solid var(--line);
            border-left: 4px solid var(--accent);
            border-radius: 14px;
            padding: 12px;
            margin-bottom: 10px;
            box-shadow: 0 4px 12px rgba(26, 31, 36, 0.06);
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            align-items: flex-start;
        }

        .event-title {
            margin: 0;
            font-size: 16px;
            line-height: 1.25;
            font-weight: 600;
        }

        .event-time {
            color: var(--muted);
            font-size: 13px;
            white-space: nowrap;
            font-weight: 500;
        }

        .meta-row {
            margin-top: 8px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
            color: #2f3842;
            font-size: 13px;
        }

        .chip {
            padding: 4px 8px;
            border-radius: 999px;
            background: var(--chip);
            border: 1px solid var(--line);
            font-size: 12px;
            font-weight: 500;
        }

        .link {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }

        .link:hover {
            text-decoration: underline;
        }

        .organizers {
            margin-top: 8px;
            font-size: 13px;
            color: #2f3842;
        }

        .summary {
            margin: 10px 0 0;
            color: #3d4650;
            font-size: 14px;
            line-height: 1.35;
        }

        .event-card-cancelled {
            opacity: 0.55;
            border-left-color: var(--danger);
        }

        .event-card-cancelled .event-title {
            text-decoration: line-through;
            color: var(--muted);
        }

        .cancelled-badge {
            display: inline-block;
            margin-left: 8px;
            padding: 2px 7px;
            border-radius: 999px;
            background: #fde8e8;
            color: var(--danger);
            border: 1px solid #f0b8b8;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            vertical-align: middle;
        }

        .today-badge {
            display: inline-block;
            margin-left: 10px;
            padding: 2px 8px;
            border-radius: 999px;
            background: var(--accent);
            color: white;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            vertical-align: middle;
        }

        .empty {
            border: 1px dashed var(--line);
            border-radius: 14px;
            padding: 18px;
            background: #fffef8;
            color: var(--muted);
            text-align: center;
        }

        .error {
            border: 1px solid #e6b3b3;
            background: #fff5f5;
            color: var(--danger);
            border-radius: 12px;
            padding: 12px;
            font-size: 14px;
        }

        @media (min-width: 720px) {
            body {
                padding: 28px;
            }

            .hero {
                padding: 26px 24px 20px;
            }

            .filters {
                padding: 16px 24px;
            }

            .filter-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            main {
                padding: 18px 24px 24px;
            }
        }

        @keyframes fadeIn {
            from {
                transform: translateY(4px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div class="shell">
        <header class="hero">
            <span class="kicker"> Schedule </span>
            <h1> Events Lined Up Ahead</h1>
            <p class="subtitle"> Read-Only. Contact admin for updates</p>
        </header>

        <section class="filters" aria-label="Event Filters">
            <div class="filter-grid">
                <div>
                    <label for="day-filter">Show Events For</label>
                    <select id="day-filter">
                        <option value="7">Next 7 Days</option>
                        <option value="14">Next 2 Weeks</option>
                        <option value="21">Next 3 Weeks</option>
                        <option value="30">Next Month</option>
                    </select>
                </div>

                <div>
                    <label for="venueFilter">Venue</label>
                    <select id="venueFilter">
                        <option value="all">All Venues</option>
                    </select>
                </div>

                <div>
                    <label for="typeFilter">Event Type</label>
                    <select id="typeFilter">
                        <option value="all">All Types</option>
                    </select>
                </div>

                <div>
                    <label for="organizerFilter">Organizer</label>
                    <select id="organizerFilter">
                        <option value="all">All Organizers</option>
                    </select>
                </div>

                <div>
                    <label for="search-filter">Search</label>
                    <input id="search-filter" type="search" placeholder="Search title, summary, organizer">
                </div>

                <div class="filter_actions">
                    <button id="clearFiltersBtn" type="button">Clear Filters</button>
                </div>
            </div>
            <div id="summary">Loading upcoming events...</div>
            <div id="activeFilters" class="active-filters" aria-live="polite">Active filters: none</div>
        </section>

        <main id="eventsRoot" aria-live="polite"></main>
    </div>

    <script>
        const eventsRoot = document.getElementById("eventsRoot");
        const daysFilter = document.getElementById("day-filter");
        const venueFilter = document.getElementById("venueFilter");
        const typeFilter = document.getElementById("typeFilter");
        const organizerFilter = document.getElementById("organizerFilter");
        const searchFilter = document.getElementById("search-filter");
        const clearFiltersBtn = document.getElementById("clearFiltersBtn");
        const summary = document.getElementById("summary");
        const activeFilters = document.getElementById("activeFilters");

        const DEFAULT_DAYS_AHEAD = 7;
        let allEvents = [];

        function formatDayTitle(dateObj) {
            return new Intl.DateTimeFormat(undefined, {
                weekday: "long",
                day: "2-digit",
                month: "short"
            }).format(dateObj);
        }

        function formatTimeRange(start, end) {
            return `${new Intl.DateTimeFormat(undefined, { hour: "2-digit", minute: "2-digit" }).format(start)} - ${new Intl.DateTimeFormat(undefined, { hour: "2-digit", minute: "2-digit" }).format(end)}`;
        }

        function formatDuration(start, end) {
            const mins = Math.round((end - start) / 60000);
            if (mins < 60) return `${mins} min`;
            const h = Math.floor(mins / 60);
            const m = mins % 60;
            return m ? `${h}h ${m}m` : `${h}h`;
        }

        function escapeHtml(value) {
            return String(value)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function getSafeUrl(url) {
            if (typeof url !== "string") return "";
            const trimmed = url.trim();
            return /^https?:\/\//i.test(trimmed) ? trimmed : "";
        }

        function renderVenue(event) {
            const venueText = escapeHtml(event.venue || "-");
            const venueUrl = getSafeUrl(event.venueUrl);

            if (venueUrl) {
                return `<a class="link chip" href="${escapeHtml(venueUrl)}" target="_blank" rel="noopener noreferrer">${venueText}</a>`;
            }

            return `<span class="chip">${venueText}</span>`;
        }

        function normalizeOrganizers(event) {
            if (Array.isArray(event.organizers)) {
                return event.organizers;
            }

            if (event.organizer) {
                return [{ name: event.organizer, url: event.organizerUrl || "" }];
            }

            return [];
        }

        function renderOrganizer(event) {
            const organizers = normalizeOrganizers(event).filter(item => item && item.name);
            if (!organizers.length) {
                return "";
            }

            const organizerHtml = organizers.map(item => {
                const name = escapeHtml(item.name);
                const url = getSafeUrl(item.url);

                if (url) {
                    return `<a class="link" href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer">${name}</a>`;
                }

                return `<span>${name}</span>`;
            }).join(", ");

            return `<p class="organizers"><strong>Organizers:</strong> ${organizerHtml}</p>`;
        }

        function getOrganizerName(event) {
            return normalizeOrganizers(event)
                .map(item => (item.name ? String(item.name).trim() : ""))
                .filter(Boolean);
        }

        function addDistinctOptions(selectEl, values, allLabel) {
            const existing = Array.from(selectEl.options).map(opt => opt.value);
            values.forEach(value => {
                if (!existing.includes(value)) {
                    const opt = document.createElement("option");
                    opt.value = value;
                    opt.textContent = value;
                    selectEl.appendChild(opt);
                }
            });

            selectEl.options[0].textContent = allLabel;
        }

        function eventInWindow(event, daysAhead) {
            const now = new Date();
            const todayStart = new Date(now);
            todayStart.setHours(0, 0, 0, 0);

            const endWindow = new Date(todayStart);
            endWindow.setDate(endWindow.getDate() + daysAhead);

            const start = new Date(event.startDateTime);
            const end = new Date(event.endDateTime);
            return end >= now && start <= endWindow;
        }

        function getFilteredEvents() {
            const selectedDays = Number(daysFilter.value) || DEFAULT_DAYS_AHEAD;
            const selectedVenue = venueFilter.value;
            const selectedType = typeFilter.value;
            const selectedOrganizer = organizerFilter.value;
            const selectedTerm = searchFilter.value.trim().toLowerCase();

            return allEvents
                .filter(event => eventInWindow(event, selectedDays))
                .filter(event => selectedVenue === "all" || event.venue === selectedVenue)
                .filter(event => selectedType === "all" || event.type === selectedType)
                .filter(event => selectedOrganizer === "all" || getOrganizerName(event).some(name => name.toLowerCase() === selectedOrganizer.toLowerCase()))
                .filter(event => {
                    if (!selectedTerm) return true;

                    const searchableText = [event.title, event.summary, ...getOrganizerName(event)]
                        .filter(Boolean)
                        .join(" ")
                        .toLowerCase();

                    return searchableText.includes(selectedTerm);
                });
        }

        function getSelectedLabel(selectEl) {
            return selectEl.options[selectEl.selectedIndex].textContent || "";
        }

        function renderActiveFilters() {
            const tokens = [];

            if ((Number(daysFilter.value) || DEFAULT_DAYS_AHEAD) !== DEFAULT_DAYS_AHEAD) {
                tokens.push(`Days : ${escapeHtml(getSelectedLabel(daysFilter))}`);
            }

            if (venueFilter.value !== "all") {
                tokens.push(`Venue : ${escapeHtml(getSelectedLabel(venueFilter))}`);
            }

            if (typeFilter.value !== "all") {
                tokens.push(`Type : ${escapeHtml(getSelectedLabel(typeFilter))}`);
            }

            if (organizerFilter.value !== "all") {
                tokens.push(`Organizer : ${escapeHtml(getSelectedLabel(organizerFilter))}`);
            }

            const searchText = searchFilter.value.trim();
            if (searchText) {
                tokens.push(`Search : ${escapeHtml(searchText)}`);
            }

            if (!tokens.length) {
                activeFilters.textContent = "Active filters: none";
                return;
            }

            activeFilters.innerHTML = `Active filters: ${tokens.map(token => `<span class="active-filter-chip">${token}</span>`).join(" ")}`;
        }

        function renderEvents() {
            const selectedDays = Number(daysFilter.value) || DEFAULT_DAYS_AHEAD;
            const events = getFilteredEvents();
            renderActiveFilters();

            if (!events.length) {
                summary.textContent = "No events found matching your criteria.";
                eventsRoot.innerHTML = '<section class="empty"> No events found matching your criteria.</section>';
                return;
            }

            summary.textContent = `${events.length} event${events.length === 1 ? "" : "s"} in the next ${selectedDays} days`;

            const grouped = events.reduce((acc, event) => {
                const key = new Date(event.startDateTime).toDateString();
                if (!acc[key]) acc[key] = [];
                acc[key].push(event);
                return acc;
            }, {});

            eventsRoot.innerHTML = Object.entries(grouped)
                .map(([dayKey, dayEvents]) => {
                    const dayDate = new Date(dayKey);
                    const cards = dayEvents.map(event => {
                        const start = new Date(event.startDateTime);
                        const end = new Date(event.endDateTime);
                        const title = escapeHtml(event.title || "Untitled Event");
                        const eventType = escapeHtml(event.type || "-");
                        const eventSummary = escapeHtml(event.summary || "");
                        const cancelled = event.cancelled === true;

                        return `
                        <article class="event-card${cancelled ? " event-card-cancelled" : ""}">
                            <div class="card-top">
                                <h3 class="event-title">${title}${cancelled ? ' <span class="cancelled-badge">Cancelled</span>' : ""}</h3>
                                <span class="event-time">${formatTimeRange(start, end)} • ${formatDuration(start, end)}</span>
                            </div>
                            <div class="meta-row">
                                ${renderVenue(event)}
                                <span class="chip">${eventType}</span>
                            </div>
                            ${renderOrganizer(event)}
                            ${eventSummary ? `<p class="summary">${eventSummary}</p>` : ""}
                        </article>
                        `;
                    }).join("");

                    const isToday = dayDate.toDateString() === new Date().toDateString();
                    return `
                        <section class="day-block">
                            <h2 class="day-title">${formatDayTitle(dayDate)}${isToday ? ' <span class="today-badge">Today</span>' : ""}</h2>
                            ${cards}
                        </section>
                    `;
                })
                .join("");
        }

        function renderError(message) {
            summary.textContent = "Could not load Events.";
            eventsRoot.innerHTML = `<section class="error">${message}</section>`;
        }

        function clearFilters() {
            daysFilter.value = String(DEFAULT_DAYS_AHEAD);
            venueFilter.value = "all";
            typeFilter.value = "all";
            organizerFilter.value = "all";
            searchFilter.value = "";
            renderEvents();
        }

        async function init() {
            try {
                const response = await fetch("./events.json", { cache: "no-store" });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const data = await response.json();
                allEvents = Array.isArray(data.events) ? data.events : [];

                const venues = [...new Set(allEvents.map(m => m.venue).filter(Boolean))].sort();
                const types = [...new Set(allEvents.map(m => m.type).filter(Boolean))].sort();
                const organizers = [...new Set(allEvents.flatMap(getOrganizerName))].sort();

                addDistinctOptions(venueFilter, venues, "All Venues");
                addDistinctOptions(typeFilter, types, "All Types");
                addDistinctOptions(organizerFilter, organizers, "All Organisers");

                daysFilter.addEventListener("change", renderEvents);
                venueFilter.addEventListener("change", renderEvents);
                typeFilter.addEventListener("change", renderEvents);
                organizerFilter.addEventListener("change", renderEvents);
                searchFilter.addEventListener("input", renderEvents);
                clearFiltersBtn.addEventListener("click", clearFilters);

                renderEvents();
            } catch (error) {
                renderError("Unable to read events.json. If opened directly from file explorer, run a small local server or publish this folder as a static site.");
            }
        }

        init();
    </script>
</body>

</html>
